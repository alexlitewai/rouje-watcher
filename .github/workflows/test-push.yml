name: test-push-ntfy
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Test bout-en-bout sur la taille 42 (réellement en stock)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          sed -i 's/36|38/42/; s/dispo !/dispo ! [TEST-42]/' check_rouje.sh
          bash check_rouje.sh
